name: CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/jkaminska2/tasks-backend:prod ./app/backend

      - name: Build worker image
        run: |
          docker build -t ghcr.io/jkaminska2/tasks-worker:prod ./app/worker

      - name: Validate Kubernetes manifests
        run: |
          curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz"
          tar -xzf kustomize_v5.4.1_linux_amd64.tar.gz
          chmod +x kustomize
          ./kustomize build k8s/prod > /tmp/manifests.yaml
          echo "Manifests generated successfully"
          cat /tmp/manifests.yaml | grep "^kind:" | sort | uniq -c

      - name: Push backend image
        run: |
          docker push ghcr.io/jkaminska2/tasks-backend:prod

      - name: Push worker image
        run: |
          docker push ghcr.io/jkaminska2/tasks-worker:prod

      - name: Deploy to Kubernetes
        run: |
          echo "Deploy wykonywany lokalnie przez: kubectl apply -k k8s/prod"
          echo "Obrazy dostępne w rejestrze:"
          echo "  ghcr.io/jkaminska2/tasks-backend:prod"
          echo "  ghcr.io/jkaminska2/tasks-worker:prod"